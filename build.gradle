plugins {
    id 'com.android.application' version '9.1.1'
}

// Explicitly define the system requirements for a single-module project structure
android {
    namespace 'org.tgallagherm.torque.wrenchtimepro'
    compileSdk "android-37.0"
    buildToolsVersion "37.0.0"

    defaultConfig {
        applicationId "org.tgallagherm.torque.wrenchtimepro"
        minSdk 26
        targetSdk 37
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    buildFeatures {
        aidl true
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}